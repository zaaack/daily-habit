name: Build and Release Tauri Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      targets:
        description: '要构建的目标（逗号分隔，如 android,linux,macos,windows）留空则构建全部'
        required: false
        default: 'android,linux,macos,windows'
        type: string

permissions:
  contents: write

concurrency:
  group: tauri-release
  cancel-in-progress: true

jobs:
  # ── Android ──────────────────────────────────────────────────────────
  build-android:
    if: github.event_name == 'push' || contains(github.event.inputs.targets || '', 'android')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android,
            i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          NDK_DIR=$(ls -d "$ANDROID_HOME/ndk"/*/ 2>/dev/null | head -1)
          if [ -z "$NDK_DIR" ]; then
            echo "No NDK found, installing latest..."
            "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk" > /dev/null 2>&1 || true
            NDK_DIR=$(ls -d "$ANDROID_HOME/ndk"/*/ 2>/dev/null | head -1)
          fi
          if [ -n "$NDK_DIR" ]; then
            echo "ANDROID_NDK_HOME=${NDK_DIR%/}" >> "$GITHUB_ENV"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          mobile: android
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: 'android-[bundle]'

  # ── Desktop (Linux / macOS / Windows) ───────────────────────────────
  build-desktop:
    if: github.event_name == 'push' || github.event.inputs.targets != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            runner: ubuntu-latest
            system-deps: |
              sudo apt-get update &&
              sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf

          - target: macos
            runner: macos-latest

          - target: windows
            runner: windows-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install system dependencies (Linux)
        if: matrix.target == 'linux'
        run: ${{ matrix.system-deps }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: '${{ matrix.target }}-[bundle]'

  # ── Create Release (tag push only) ──────────────────────────────────
  create-release:
    needs: [build-android, build-desktop]
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: '*'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.apk
            **/*.deb
            **/*.AppImage
            **/*.rpm
            **/*.dmg
            **/*.app
            **/*.msi
            **/*.exe
          name: Daily Habit ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
