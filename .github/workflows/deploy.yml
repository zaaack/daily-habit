name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy-pages:
        description: 'Deploy to GitHub Pages'
        required: false
        default: true
        type: boolean
      deploy-cloudflare:
        description: 'Deploy to Cloudflare Workers'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Copy index.html to 404.html (SPA fallback)
        run: cp docs/index.html docs/404.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Trigger Cloudflare Workers deploy hook
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.deploy-cloudflare == 'true'
        run: curl -fsS -X POST "${{ secrets.CF_BUILD_TOKEN }}"
        continue-on-error: true

  deploy:
    needs: build
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.deploy-pages == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
