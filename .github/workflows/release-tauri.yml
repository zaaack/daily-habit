name: Build and Release Tauri Apps

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      targets:
        description: '要构建的目标（逗号分隔，如 android,linux,macos,windows）留空则构建全部'
        required: false
        default: 'android,linux,macos,windows'
        type: string

permissions:
  contents: write

concurrency:
  group: tauri-release
  cancel-in-progress: true

jobs:
  # ── Create Release ──────────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Get version
        id: get-version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${process.env.VERSION}`,
              name: `Daily Habit v${process.env.VERSION}`,
              body: 'Take a look at the assets to download and install this app.',
              draft: true,
              prerelease: false
            })
            return data.id
        env:
          VERSION: ${{ steps.get-version.outputs.version }}

  # ── Android (ARM only, APK + AAB) ──────────────────────────────────
  build-android:
    needs: create-release
    if: github.event_name == 'push' || contains(github.event.inputs.targets || '', 'android')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libssl-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          NDK_DIR=$(ls -d "$ANDROID_HOME/ndk"/*/ 2>/dev/null | head -1)
          if [ -z "$NDK_DIR" ]; then
            echo "No NDK found, installing latest..."
            "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk" > /dev/null 2>&1 || true
            NDK_DIR=$(ls -d "$ANDROID_HOME/ndk"/*/ 2>/dev/null | head -1)
          fi
          if [ -n "$NDK_DIR" ]; then
            echo "ANDROID_NDK_HOME=${NDK_DIR%/}" >> "$GITHUB_ENV"
          fi

      - name: Build Android (ARM APK + AAB)
        run: pnpm tauri android build --target aarch64 --target armv7

      - name: Upload artifacts to Release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const dirs = [
              'src-tauri/gen/android/app/build/outputs/apk',
              'src-tauri/gen/android/app/build/outputs/bundle',
            ];
            const files = [];

            function walkDir(dir) {
              if (!fs.existsSync(dir)) return;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) walkDir(full);
                else if (entry.name.endsWith('.apk') || entry.name.endsWith('.aab')) files.push(full);
              }
            }
            for (const dir of dirs) walkDir(dir);

            for (const file of files) {
              const data = fs.readFileSync(file);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: parseInt(process.env.release_id),
                name: path.basename(file),
                data,
              });
              console.log(`Uploaded: ${file}`);
            }

  # ── Desktop (Linux ARM64 / macOS / Windows) ────────────────────────
  build-desktop:
    needs: create-release
    if: github.event_name == 'push' || github.event.inputs.targets != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04-arm
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build and upload to Release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # ── Publish Release ────────────────────────────────────────────────
  publish-release:
    needs: [create-release, build-desktop, build-android]
    if: always() && needs.create-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
          desktop_result: ${{ needs.build-desktop.result }}
          android_result: ${{ needs.build-android.result }}
        with:
          script: |
            const success = ['success', 'skipped'];
            if (!success.includes(process.env.desktop_result) && !success.includes(process.env.android_result)) {
              core.setFailed('All build jobs failed or were cancelled.');
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: parseInt(process.env.release_id),
              draft: false,
              prerelease: false
            });
            console.log('Release published successfully!');
