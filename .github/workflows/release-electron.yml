name: Build and Release Electron Apps

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      targets:
        description: '要构建的目标（逗号分隔，如 linux,macos,windows）留空则构建全部'
        required: false
        default: 'linux,macos,windows'
        type: string

permissions:
  contents: write

concurrency:
  group: electron-release
  cancel-in-progress: true

jobs:
  # ── Create Release ──────────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Get version
        id: get-version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${process.env.VERSION}`;
            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              console.log(`Reusing existing release ${existing.id} for tag ${tag}`);
              return existing.id;
            } catch (e) {
              if (e.status !== 404) throw e;
            }
            try {
              const { data } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Daily Habit v${process.env.VERSION}`,
                body: 'Take a look at the assets to download and install this app.',
                draft: true,
                prerelease: false
              })
              return data.id
            } catch (e) {
              if (e.status === 422 && e.message?.includes('tag_name')) {
                const { data: existing } = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag,
                });
                return existing.id;
              }
              throw e;
            }
        env:
          VERSION: ${{ steps.get-version.outputs.version }}

  # ── Desktop (Linux / macOS / Windows) ───────────────────────────────
  build-desktop:
    needs: create-release
    if: github.event_name == 'push' || github.event.inputs.targets != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            os: linux
          - platform: macos-latest
            os: macos
          - platform: windows-latest
            os: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to Release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const releaseDir = 'release';
            const files = [];

            function walkDir(dir) {
              if (!fs.existsSync(dir)) return;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) walkDir(full);
                else if (entry.name.endsWith('.exe') || entry.name.endsWith('.dmg') ||
                         entry.name.endsWith('.zip') || entry.name.endsWith('.AppImage') ||
                         entry.name.endsWith('.deb') || entry.name.endsWith('.yml') ||
                         entry.name.endsWith('.yaml')) {
                  files.push(full);
                }
              }
            }
            walkDir(releaseDir);

            for (const file of files) {
              const data = fs.readFileSync(file);
              const name = path.basename(file);
              // Skip latest.yml (electron-builder auto-update metadata)
              if (name === 'latest.yml' || name === 'latest.yaml') continue;
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: parseInt(process.env.release_id),
                name,
                data,
              });
              console.log(`Uploaded: ${name}`);
            }

  # ── Publish Release ────────────────────────────────────────────────
  publish-release:
    needs: [create-release, build-desktop]
    if: always() && needs.create-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
          desktop_result: ${{ needs.build-desktop.result }}
        with:
          script: |
            const success = ['success', 'skipped'];
            if (!success.includes(process.env.desktop_result)) {
              core.setFailed('Build job failed or was cancelled.');
              return;
            }
            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: parseInt(process.env.release_id),
            });
            if (!release.draft) {
              console.log('Release is already published, skipping.');
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: parseInt(process.env.release_id),
              draft: false,
              prerelease: false
            });
            console.log('Release published successfully!');
