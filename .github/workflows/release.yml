name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip-android:
        description: '跳过 Android APK 构建'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  # ── Build Desktop (Linux / macOS / Windows) ────────────────────────
  # electron-builder --publish always 自动创建 release 并上传
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            os: linux
          - platform: macos-latest
            os: macos
          - platform: windows-latest
            os: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build
        env:
          ELECTRON: '1'

      - name: Build and Publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

  # ── Build Android APK ──────────────────────────────────────────────
  build-android:
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.skip-android != 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: android/app/build/outputs/apk/debug/*.apk

  # ── Upload Android APK to Release ──────────────────────────────────
  upload-android:
    needs: [build-desktop, build-android]
    if: always() && needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android
          path: artifacts

      - name: Upload APK to Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const tag = context.ref.replace('refs/tags/', '');

            let release;
            try {
              ({ data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              }));
            } catch (e) {
              if (e.status === 404) {
                core.warning(`Release for ${tag} not found (desktop build may have failed). Skipping APK upload.`);
                return;
              }
              throw e;
            }

            const { data: existingAssets } = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
            });
            const existingNames = new Set(existingAssets.map(asset => asset.name));

            const dir = 'artifacts';
            for (const file of fs.readdirSync(dir)) {
              if (!file.endsWith('.apk')) continue;

              if (existingNames.has(file)) {
                console.log(`Skipping existing asset: ${file}`);
                continue;
              }

              const data = fs.readFileSync(path.join(dir, file));
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name: file,
                data,
              });
              console.log(`Uploaded: ${file}`);
            }

  # ── Publish Release ────────────────────────────────────────────────
  publish-release:
    needs: [build-desktop, build-android]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');

            let release;
            try {
              ({ data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              }));
            } catch (e) {
              if (e.status === 404) {
                core.warning(`Release for ${tag} not found (desktop build may have failed). Skipping publish.`);
                return;
              }
              throw e;
            }

            if (!release.draft) {
              console.log('Release is already published, skipping.');
              return;
            }

            const success = ['success', 'skipped'];
            const androidOk = success.includes('${{ needs.build-android.result }}');
            const desktopOk = success.includes('${{ needs.build-desktop.result }}');

            if (!androidOk || !desktopOk) {
              core.setFailed('Build job failed or was cancelled.');
              return;
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
              prerelease: false
            });
            console.log('Release published successfully!');
