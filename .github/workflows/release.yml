name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      targets:
        description: 'Electron 构建目标（逗号分隔，如 linux,macos,windows）留空则构建全部'
        required: false
        default: 'linux,macos,windows'
        type: string
      skip-android:
        description: '跳过 Android APK 构建'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  # ── Create Release ──────────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get-version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${process.env.VERSION}`;
            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              console.log(`Reusing existing release ${existing.id} for tag ${tag}`);
              return existing.id;
            } catch (e) {
              if (e.status !== 404) throw e;
            }
            try {
              const { data } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Daily Habit v${process.env.VERSION}`,
                body: 'Take a look at the assets to download and install this app.',
                draft: true,
                prerelease: false
              })
              return data.id
            } catch (e) {
              if (e.status === 422 && e.message?.includes('tag_name')) {
                const { data: existing } = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag,
                });
                return existing.id;
              }
              throw e;
            }
        env:
          VERSION: ${{ steps.get-version.outputs.version }}

  # ── Build Android APK ──────────────────────────────────────────────
  build-android:
    needs: create-release
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.skip-android != 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp android/app/build/outputs/apk/debug/app-debug.apk "android/app/build/outputs/apk/debug/daily-habit-${VERSION}.apk"

      - name: Upload APK to Release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'android/app/build/outputs/apk/debug';

            // Get existing assets to avoid duplicates
            const { data: existingAssets } = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: parseInt(process.env.release_id),
            });
            const existingNames = new Set(existingAssets.map(asset => asset.name));

            for (const file of fs.readdirSync(dir)) {
              if (!file.endsWith('.apk')) continue;
              
              if (existingNames.has(file)) {
                console.log(`Skipping existing asset: ${file}`);
                continue;
              }
              
              const data = fs.readFileSync(path.join(dir, file));
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: parseInt(process.env.release_id),
                name: file,
                data,
              });
              console.log(`Uploaded: ${file}`);
            }

  # ── Build Desktop (Linux / macOS / Windows) ────────────────────────
  build-desktop:
    needs: create-release
    if: github.event_name == 'push' || github.event.inputs.targets != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            os: linux
          - platform: macos-latest
            os: macos
          - platform: windows-latest
            os: windows

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts to Release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const releaseDir = 'release';
            const files = [];

            function walkDir(dir) {
              if (!fs.existsSync(dir)) return;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) walkDir(full);
                else if (entry.name.endsWith('.exe') || entry.name.endsWith('.dmg') ||
                         entry.name.endsWith('.zip') || entry.name.endsWith('.AppImage') ||
                         entry.name.endsWith('.deb') || entry.name.endsWith('.yml') ||
                         entry.name.endsWith('.yaml')) {
                  files.push(full);
                }
              }
            }
            walkDir(releaseDir);

            // Get existing assets to avoid duplicates
            const { data: existingAssets } = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: parseInt(process.env.release_id),
            });
            const existingNames = new Set(existingAssets.map(asset => asset.name));

            for (const file of files) {
              const data = fs.readFileSync(file);
              const name = path.basename(file);
              // Skip latest.yml (electron-builder auto-update metadata)
              if (name === 'latest.yml' || name === 'latest.yaml') continue;
              
              if (existingNames.has(name)) {
                console.log(`Skipping existing asset: ${name}`);
                continue;
              }
              
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: parseInt(process.env.release_id),
                name,
                data,
              });
              console.log(`Uploaded: ${name}`);
            }

  # ── Publish Release ────────────────────────────────────────────────
  publish-release:
    needs: [create-release, build-android, build-desktop]
    if: always() && needs.create-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
          android_result: ${{ needs.build-android.result }}
          desktop_result: ${{ needs.build-desktop.result }}
        with:
          script: |
            const success = ['success', 'skipped'];
            if (!success.includes(process.env.android_result) || !success.includes(process.env.desktop_result)) {
              core.setFailed('Build job failed or was cancelled.');
              return;
            }
            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: parseInt(process.env.release_id),
            });
            if (!release.draft) {
              console.log('Release is already published, skipping.');
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: parseInt(process.env.release_id),
              draft: false,
              prerelease: false
            });
            console.log('Release published successfully!');
