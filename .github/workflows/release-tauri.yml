name: Build and Release Tauri Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tauri-release
  cancel-in-progress: true

jobs:
  # ── Android (Tauri) ──────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (with Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android,
            i686-linux-android

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          NDK_VERSION="27.0.12077973"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;${NDK_VERSION}" > /dev/null 2>&1 || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Cache Cargo (Android)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: android-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri Android APK
        run: pnpm tauri android build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-habit-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  # ── Desktop (Linux / macOS / Windows) ───────────────────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            runner: ubuntu-latest
            system-deps: |
              sudo apt-get update &&
              sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf
            artifact-paths: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/rpm/*.rpm

          - target: macos
            runner: macos-latest
            artifact-paths: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/**/*.app

          - target: windows
            runner: windows-latest
            artifact-paths: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: matrix.target == 'linux'
        run: ${{ matrix.system-deps }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-habit-${{ matrix.target }}
          path: ${{ matrix.artifact-paths }}

  # ── Create Release ──────────────────────────────────────────────────
  create-release:
    needs: [build-android, build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            daily-habit-android/**/*.apk
            daily-habit-linux/**/*.deb
            daily-habit-linux/**/*.AppImage
            daily-habit-linux/**/*.rpm
            daily-habit-macos/**/*.dmg
            daily-habit-macos/**/*.app
            daily-habit-windows/**/*.msi
            daily-habit-windows/**/*.exe
          name: Daily Habit ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
