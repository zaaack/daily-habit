name: Build and Release APK (Capacitor)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp android/app/build/outputs/apk/debug/app-debug.apk "android/app/build/outputs/apk/debug/daily-habit-capacitor-${VERSION}.apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-habit-apk
          path: android/app/build/outputs/apk/debug/daily-habit-*.apk

      - name: Upload APK to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'android/app/build/outputs/apk/debug';
            const tag = context.ref.replace('refs/tags/', '');

            // Find or create release
            let release;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              release = data;
              console.log(`Found existing release ${release.id}`);
            } catch (e) {
              if (e.status !== 404) throw e;
              try {
                const { data } = await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tag,
                  name: `Daily Habit ${tag}`,
                  draft: false,
                  prerelease: false,
                });
                release = data;
                console.log(`Created new release ${release.id}`);
              } catch (e) {
                if (e.status === 422 && e.message?.includes('tag_name')) {
                  const { data } = await github.rest.repos.getReleaseByTag({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    tag,
                  });
                  release = data;
                  console.log(`Tag ${tag} exists, reusing release ${release.id}`);
                } else {
                  throw e;
                }
              }
            }

            for (const file of fs.readdirSync(dir)) {
              if (!file.endsWith('.apk')) continue;
              const data = fs.readFileSync(path.join(dir, file));
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name: file,
                data,
              });
              console.log(`Uploaded: ${file}`);
            }
